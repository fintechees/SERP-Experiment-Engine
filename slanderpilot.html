// =========================
// DETERMINSITIC ASSIGNMENT ENGINE
// =========================
function buildSemanticSequence(pid){
  const step = 3;
  const start = pid % 4;

  return Array.from(
    {length:8},
    (_,t)=>(start + t*step)%4
  );
}

function buildPositionSequence(pid){
  const step = 5;
  const start = pid % 8;

  return Array.from(
    {length:8},
    (_,t)=>(start + t*step)%8
  );
}

// =========================
// BUILD FUNCTIONS
// =========================
function buildSemantic(t, s){
  let arr = [...SEM_POOL[t]];
  arr[1] = semanticTargets[t][s];
  return arr;
}

function buildPositional(t, p){
  let arr = [...POS_POOL[t]];
  arr.splice(posIndex[p], 0, sharp[t]);
  return arr;
}

// =========================
// RENDER
// =========================
function renderSemantic(title, data, ex){
  let html = `<div class='serp'>`;
  html += `<div class='title'>${title}</div>`;
  data.forEach((d,i)=> html += `<div class='item'>${i+1}. ${d}</div>`);
  html += `<div>Score: <input class='score score-sem' data-ex="${ex}"></div>`;
  html += `</div>`;
  return html;
}

function renderPositional(title, data, ex){
  let html = `<div class='serp'>`;
  html += `<div class='title'>${title}</div>`;
  data.forEach((d,i)=> html += `<div class='item'>${i+1}. ${d}</div>`);
  html += `<div>Score: <input class='score score-pos' data-ex="${ex}"></div>`;
  html += `</div>`;
  return html;
}

  const semSeq = buildSemanticSequence(pid);
  console.log(semSeq);

  for(let t=0; t<SEM_POOL.length; t++){
     let semantic = semSeq[t];
     const id = 'S' + (Math.floor(1000 + Math.random() * 9000) + '') + (semantic+1) + (Math.floor(100 + Math.random() * 900) + '');

     let serp = buildSemantic(t, semantic);
     $('#cases').append(renderSemantic(`${id}`, serp, id));
  }

  const posSeq = buildPositionSequence(pid);
  console.log(posSeq);

  for(let t=0; t<POS_POOL.length; t++){
     let position = posSeq[t];
     const id = 'P' + (Math.floor(100 + Math.random() * 900) + '') + (posIndex[position]+1) + (Math.floor(1000 + Math.random() * 9000) + '');

     let serp = buildPositional(t, position);
     $('#cases').append(renderPositional(`${id}`, serp, id));
  }
});

  $('.score-pos').each(function(){pos_out.push($(this).val()||"");});
